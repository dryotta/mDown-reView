name: Release Gate

on:
  pull_request:
    branches: [main]

concurrency:
  group: release-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Cross-platform tests (Linux, Windows, macOS) ─────────────────────────
  test:
    name: Test (${{ matrix.name }})
    if: startsWith(github.head_ref, 'release/')
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: linux
          - os: windows-latest
            name: windows
          - os: macos-latest
            name: macos

    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Set up Node.js (LTS)
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
          version: 1.0

      - name: Rust tests
        working-directory: src-tauri
        run: cargo test

      - name: Vitest unit tests
        run: npm test

      - name: Install Playwright (Chromium only)
        run: npx playwright install --with-deps chromium

      - name: Playwright E2E tests (browser mode)
        run: npm run test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.name }}
          path: |
            playwright-report/
            test-results/
          retention-days: 7

  # ── Installer builds (Windows + macOS) ───────────────────────────────────
  build:
    name: Build (${{ matrix.name }})
    needs: test
    if: startsWith(github.head_ref, 'release/')
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: windows-x64
            rust_target: x86_64-pc-windows-msvc
            target_dir: src-tauri/target/release
            tauri_args: ""
          - os: windows-latest
            name: windows-arm64
            rust_target: aarch64-pc-windows-msvc
            target_dir: src-tauri/target/aarch64-pc-windows-msvc/release
            tauri_args: "--target aarch64-pc-windows-msvc"
          - os: macos-latest
            name: macos-arm64
            rust_target: aarch64-apple-darwin
            target_dir: src-tauri/target/release
            tauri_args: ""

    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Set up Node.js (LTS)
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Clean stale bundles from cache
        shell: bash
        run: rm -rf src-tauri/target/release/bundle src-tauri/target/*/release/bundle 2>/dev/null || true

      - name: Build Tauri app
        shell: bash
        run: |
          if [ -n "${{ matrix.tauri_args }}" ]; then
            npm run tauri:build -- ${{ matrix.tauri_args }}
          else
            npm run tauri:build
          fi
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

  # NOTE: Native E2E tests require a real desktop environment (WebView2 + CDP)
  # which is not available on GitHub Actions runners. Run them locally before
  # publishing a release — the publish-release skill enforces this gate.

  # ── Native E2E tests (Windows, WebView2 + CDP) ──────────────────────────
  # Builds the debug binary and runs Playwright tests against a real Tauri
  # window via CDP.  windows-latest has WebView2 Runtime pre-installed and
  # a desktop session, so this works without extra setup.
  native-e2e:
    name: Native E2E (Windows)
    needs: test
    if: startsWith(github.head_ref, 'release/')
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Set up Node.js (LTS)
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Build debug binary
        working-directory: src-tauri
        run: cargo build

      - name: Install Playwright (Chromium only)
        run: npx playwright install --with-deps chromium

      - name: Native E2E tests
        run: npm run test:e2e:native

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-native-e2e
          path: |
            playwright-report/
            test-results/
          retention-days: 7
