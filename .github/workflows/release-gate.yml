name: Release Gate

on:
  pull_request:
    branches: [main]
    # Skip release-gate runs for documentation-only / skill-prose / runtime-state changes —
    # these never affect built artefacts. iterate-one-issue Step 8.5 retrospectives land
    # under .claude/retrospectives/, so an iterate branch with a retro commit on top of
    # validated code does not need re-validation by this filter.
    paths-ignore:
      - '.claude/**'
      - 'docs/**'
      - '*.md'
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch ref to validate (used by iterate-one-issue Step 9a)'
        required: true
        type: string

concurrency:
  group: release-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Cross-platform tests (Linux, Windows, macOS) ─────────────────────────
  # All jobs run in parallel — no needs dependencies.
  test:
    name: Test (${{ matrix.name }})
    if: startsWith(github.head_ref, 'release/') || github.event_name == 'workflow_dispatch'
    runs-on: ${{ matrix.os }}
    strategy:
      # fail-fast: false — release gate is the last line of defense; we want full
      # cross-platform signal in one run so iterate-one-issue Step 9c forward-fix
      # sees every failure at once, not a Linux-only failure that masks a macOS one.
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: linux
          - os: windows-latest
            name: windows
          - os: macos-latest
            name: macos

    steps:
      - uses: actions/checkout@v4
        with:
          # On workflow_dispatch, inputs.ref selects the branch to validate (overrides
          # the dispatch ref, which is the workflow file location). On pull_request,
          # inputs.ref is null so this falls back to github.ref (the PR merge ref).
          ref: ${{ inputs.ref || github.ref }}

      - name: Set up Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Set up Node.js (LTS)
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
          version: 1.0

      - name: Stage CLI binary (needed by Tauri externalBin during cargo test)
        run: npm run stage:cli

      - name: Rust tests
        working-directory: src-tauri
        run: cargo test

      - name: Vitest unit tests
        run: npm test

      - name: Get Playwright version
        id: pw-version
        shell: bash
        run: echo "version=$(npx playwright --version)" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ${{ runner.os == 'Windows' && '~/AppData/Local/ms-playwright' || '~/.cache/ms-playwright' }}
          key: playwright-${{ runner.os }}-${{ steps.pw-version.outputs.version }}

      - name: Install Playwright (Chromium only)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system deps only
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Playwright E2E tests (browser mode)
        run: npm run test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.name }}
          path: |
            playwright-report/
            test-results/
          retention-days: 7

  # ── Windows ARM64 build ─────────────────────────────────────────────────
  # Only built in release-gate (cross-compilation is ~8m).
  # x64 and macOS builds are already validated in CI.
  build-arm64:
    name: Build (windows-arm64)
    if: startsWith(github.head_ref, 'release/') || github.event_name == 'workflow_dispatch'
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Set up Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-pc-windows-msvc

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Set up Node.js (LTS)
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Clean stale bundles from cache
        shell: bash
        run: rm -rf src-tauri/target/*/release/bundle 2>/dev/null || true

      - name: Build Tauri app
        run: npm run tauri:build -- --target aarch64-pc-windows-msvc
        env:
          # Tell stage-cli.mjs (called by tauri:build) to cross-build the CLI
          # for arm64 — otherwise it stages for the host (x86_64) triple and
          # the Tauri build script's externalBin existence check fails.
          STAGE_CLI_TARGET: aarch64-pc-windows-msvc
          STAGE_CLI_PROFILE: release
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

  # ── Native E2E tests (Windows, WebView2 + CDP) ──────────────────────────
  # Builds the debug binary and runs Playwright tests against a real Tauri
  # window via CDP.  windows-latest has WebView2 Runtime pre-installed and
  # a desktop session, so this works without extra setup.
  native-e2e:
    name: Native E2E (Windows)
    if: startsWith(github.head_ref, 'release/') || github.event_name == 'workflow_dispatch'
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Set up Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          # Only the main branch publishes the cache; PR jobs restore-only.
          # Saves ~2m of post-job cache packing per PR.
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Set up Node.js (LTS)
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Stage CLI binary (needed by Tauri externalBin during cargo build)
        run: npm run stage:cli

      - name: Build debug binary (for CDP native tests)
        working-directory: src-tauri
        run: cargo build

      # NOTE: We deliberately do NOT run `tauri:build` here. The release NSIS
      # installer is already produced and validated by the CI `build
      # (windows-x64)` job on the same commit (see .github/workflows/ci.yml).
      # Rebuilding it here adds ~10 minutes for no extra coverage.
      # `installer.spec.ts` is skipped via MDR_NATIVE_SKIP_INSTALLER=1.

      - name: Get Playwright version
        id: pw-version
        shell: bash
        run: echo "version=$(npx playwright --version)" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/AppData/Local/ms-playwright
          key: playwright-Windows-${{ steps.pw-version.outputs.version }}

      - name: Install Playwright (Chromium only)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium
        # `playwright install-deps` is a Linux-only apt-get shim; on Windows it
        # is a 3-minute no-op, so we omit it on the cache-hit path.

      - name: Native E2E tests
        run: npm run test:e2e:native
        env:
          MDR_NATIVE_SKIP_INSTALLER: "1"

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-native-e2e
          path: |
            playwright-report/
            test-results/
          retention-days: 7
